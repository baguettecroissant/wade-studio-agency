<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 128 128">
  <!-- Rounded B2B Background in Deep Forest Green -->
  <rect width="128" height="128" rx="36" fill="#0B3C2E" />
  
  <!-- Subtle elegant inner border in Warm Bronze -->
  <rect x="8" y="8" width="112" height="112" rx="28" stroke="#9A784E" stroke-width="2" stroke-opacity="0.4" />
  
  <!-- Monogram W in italic serif Lora/Georgia, rendered in Sand/Cream -->
  <text x="64" y="90" font-family="Lora, Georgia, 'Times New Roman', serif" font-size="76" font-style="italic" font-weight="700" fill="#FBF9F6" text-anchor="middle">W</text>
  
  <!-- Small accent dot representing a qualified lead / monopole -->
  <circle cx="94" cy="50" r="7" fill="#9A784E" />
</svg>
